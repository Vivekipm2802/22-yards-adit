<!DOCTYPE html>

    <style>
        :root {
            /* T20 Night Match Palette */
            --stadium-night: #020617;
            --electric-cyan: #00F0FF;
            --turf-green: #39FF14;
            --midnight-blue: #0f172a;
            --deep-black: #000000;
        }

        body {
            background: var(--stadium-night);
            color: #F8FAFC;
            margin: 0;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            height: 100vh;
            width: 100vw;
            user-select: none;
        }

        .font-numbers { font-family: 'Space Grotesk', sans-serif; }

        body::after {
            content: "";
            position: fixed;
            inset: 0;
            background: 
                radial-gradient(circle at 0% 0%, rgba(0, 240, 255, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 100% 0%, rgba(0, 240, 255, 0.1) 0%, transparent 40%);
            pointer-events: none;
            z-index: 1000;
        }

        .mesh-texture {
            position: fixed;
            inset: 0;
            background-image: radial-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 4px 4px;
            z-index: -1;
            opacity: 0.5;
        }

        .font-heading { font-family: 'Teko', sans-serif; text-transform: uppercase; }
        .font-brand { font-family: 'Outfit', sans-serif; font-weight: 900; }
        .font-mono-drs { font-family: 'Courier Prime', monospace; }
        
        .logo-neon {
            background: linear-gradient(
              to bottom right,
              #00F0FF 0%,
              #39FF14 50%,
              #00F0FF 100%
            );
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer-neon 4s linear infinite;
        }

        @keyframes shimmer-neon {
            to { background-position: 200% center; }
        }

        .glass-luxury {
            background: rgba(2, 6, 23, 0.8);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(0, 240, 255, 0.2);
            box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.9);
        }

        .glass-premium {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .app-frame {
            height: 100%;
            width: 100%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .scroll-container::-webkit-scrollbar { display: none; }
        .scroll-container { -ms-overflow-style: none; scrollbar-width: none; overflow-y: auto; height: 100%; }
        .no-scrollbar::-webkit-scrollbar { display: none; }

        /* ------ LIGHT MODE THEME --------------------------------------------------------------------------------------------------------------------------------- */
        html[data-theme="light"] body {
            background: #f0f4f8 !important;
            color: #0f172a !important;
        }
        /* LiveScoreboard: make runs score visible in light mode */
        html[data-theme="light"] .live-score-runs {
            color: #0f172a !important;
        }
        /* Kill ALL box-shadows in light mode throughout the app */
        html[data-theme="light"] * {
            box-shadow: none !important;
        }
        /* Header bar: solid white, no blur, no shadow effect */
        html[data-theme="light"] .main-header {
            background-color: #ffffff !important;
            background: #ffffff !important;
            backdrop-filter: none !important;
            -webkit-backdrop-filter: none !important;
            border-bottom: 1px solid rgba(15,23,42,0.08) !important;
            box-shadow: none !important;
        }
        /* Summary tab bar — solid white bg */
        html[data-theme="light"] .summary-tab-bar {
            background-color: #ffffff !important;
            background: #ffffff !important;
            border-bottom: 1px solid rgba(15,23,42,0.08) !important;

        html[data-theme="light"] [class*="backdrop-blur"] {
            backdrop-filter: none !important;
